name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  ci:
    name: Lint · Test · Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check backend
        working-directory: backend
        run: npx tsc --noEmit

      - name: Type-check web
        working-directory: web
        run: npx tsc --noEmit

      - name: Backend tests
        working-directory: backend
        run: npx jest --forceExit

      - name: Web tests
        working-directory: web
        run: npx vitest run

      - name: Build backend
        working-directory: backend
        run: npx tsc
